name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  content-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run full content pipeline
        run: ./scripts/check_all.sh
